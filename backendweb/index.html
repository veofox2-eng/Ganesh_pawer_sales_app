<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <title>SalesFlow — Fox Editz Admin</title>
    <!-- Apply theme BEFORE render to avoid flash -->
    <script>
      (function() {
        var t = localStorage.getItem('fox-theme') || 'dark';
        document.documentElement.setAttribute('data-theme', t);
        var bgs = { dark:'#080810', light:'#f0f2f8', blue:'#00061c', green:'#010f07', red:'#0f0404' };
        document.documentElement.style.backgroundColor = bgs[t] || bgs.dark;
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
